# ============================================================
# Squid Proxy Configuration for OpenCode
# FQDN-based allowlist for secure outbound access
# ============================================================

# Localhost and loopback access
acl localnet dst 127.0.0.0/8 ::1
acl localhost_names dstdomain localhost

# Private network access (10.x.x.x for internal resources)
acl private_networks dst 10.0.0.0/8
acl private_networks dst 172.16.0.0/12
acl private_networks dst 192.168.0.0/16

# SSL/HTTPS ports
acl SSL_ports port 443
acl Safe_ports port 80          # HTTP
acl Safe_ports port 443         # HTTPS
acl CONNECT method CONNECT

# ==== ALLOWED EXTERNAL SERVICES ====

# OpenAI API endpoints
acl allowed_domains dstdomain .openai.com

# Anthropic API endpoints
acl allowed_domains dstdomain .anthropic.com

# XAI (Grok) - multiple possible domains
acl allowed_domains dstdomain .x.ai
acl allowed_domains dstdomain .xai.com
acl allowed_domains dstdomain .grok.com

# Google (for authentication/APIs)
acl allowed_domains dstdomain .google.com
acl allowed_domains dstdomain .googleapis.com

# Azure (for Azure OpenAI)
acl allowed_domains dstdomain .azure.com
acl allowed_domains dstdomain .microsoftonline.com

# GitHub (code repository/auth)
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubusercontent.com

# AWS (if using AWS Bedrock or other services)
acl allowed_domains dstdomain .amazonaws.com

# Common CDNs and package repositories
acl allowed_domains dstdomain .cloudflare.com
acl allowed_domains dstdomain .unpkg.com
acl allowed_domains dstdomain .jsdelivr.net
acl allowed_domains dstdomain .npmjs.com

# NOTE: Expand this list based on what AI models/services OpenCode needs
# Check proxy logs at: docker logs opencode-squid


# ========================================

# Deny requests to unsafe ports
http_access deny !Safe_ports

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Allow localhost access (critical for OpenCode)
http_access allow localnet
http_access allow localhost_names

# Allow private network access (10.x internal resources)
http_access allow private_networks

# Allow approved external domains (OpenAI, Anthropic, etc.)
http_access allow allowed_domains

# Deny all other access
http_access deny all

# Proxy listens on port 3128
http_port 3128

# PID file location
pid_filename /var/run/squid/squid.pid

# Cache settings (minimal caching for API responses)
cache deny all

# Logging for audit trail
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# DNS configuration
dns_nameservers 8.8.8.8 1.1.1.1

# Performance tuning
maximum_object_size 10 MB
