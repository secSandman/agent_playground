# ============================================================
# Development Secrets Configuration
# Uses local containerized Vault (vault-dev) for testing
# ============================================================

provider: vault

vault:
  # Local containerized Vault
  addr: http://vault-dev:8200
  
  # Simple token auth for dev mode
  auth_method: token
  
  # No namespace (Community Edition)
  namespace: ""
  
  # Skip TLS verification (dev mode uses HTTP)
  skip_verify: false
  
  # Test secrets populated by init-secrets.sh
  secrets:
    - path: secret/opencode/openai
      key: api_key
      env_var: OPENAI_API_KEY
    
    - path: secret/opencode/anthropic
      key: api_key
      env_var: ANTHROPIC_API_KEY
    
    - path: secret/opencode/github
      key: token
      env_var: GITHUB_TOKEN
