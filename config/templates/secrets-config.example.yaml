# ==================== Security Settings ====================
security:
  # Strict mode: Fail if any secret cannot be retrieved
  # Set to false for development to allow partial secret loading
  strict_mode: true
  
  # Refresh interval (seconds) - 0 to disable
  # Useful for rotating credentials automatically
  refresh_interval: 0
  
  # Clear secrets from memory on exit
  clear_on_exit: true
  
  # Audit logging
  audit_log: true
  audit_log_path: /var/log/opencode/secrets-audit.log
