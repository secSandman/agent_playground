# ============================================================
# Example Secrets Configuration
# Copy this file to secrets-config.yaml and customize
# ============================================================

# Choose your secrets provider
# Options: static | vault | aws-secrets-manager
provider: static

# ==================== Static API Keys (DEFAULT) ====================
# Simple environment variable based credentials
# Recommended for: Development, Testing, Personal use
static:
  # OpenAI API key
  openai_api_key: ${OPENAI_API_KEY}
  
  # Anthropic Claude API key
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  
  # Add more as needed:
  # github_token: ${GITHUB_TOKEN}
  # azure_openai_key: ${AZURE_OPENAI_KEY}

# ==================== HashiCorp Vault (COMMENTED EXAMPLES) ====================
# Uncomment and configure if using Vault

# vault:
