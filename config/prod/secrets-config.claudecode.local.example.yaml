provider: static

static:
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  openai_api_key: ${OPENAI_API_KEY}

vault:
  # Copy this file to secrets-config.claudecode.local.yaml and set real values.
  # This local file is git-ignored.
  addr: https://vault-cluster-public-vault-xxxxxxxx.xxxxxxx.z1.hashicorp.cloud:8200
  auth_method: oidc
  namespace: admin/your-org

  oidc:
    role: entra
    mount_path: oidc
    auth_namespace: admin

  secrets:
    - path: kv/opencode/anthropic
      key: api_key
      env_var: ANTHROPIC_API_KEY

    - path: kv/opencode/openai
      key: api_key
      env_var: OPENAI_API_KEY
