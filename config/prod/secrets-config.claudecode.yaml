provider: static

static:
  anthropic_api_key: ${ANTHROPIC_API_KEY}
  openai_api_key: ${OPENAI_API_KEY}

vault:
  # HCP Vault Dedicated cluster
  addr: https://vault-cluster-public-vault-6bdb9cb5.d4c0296b.z1.hashicorp.cloud:8200

  auth_method: oidc

  # Vault Enterprise namespace
  namespace: admin/secsandman

  # OIDC — Entra ID (auth mount is in admin namespace)
  oidc:
    role: entra
    mount_path: oidc
    auth_namespace: "admin"

  # KV v2 under Secrets/kv mount
  secrets:
    - path: kv/opencode/anthropic
      key: api_key
      env_var: ANTHROPIC_API_KEY

    - path: kv/opencode/openai
      key: api_key
      env_var: OPENAI_API_KEY

    # - path: kv/opencode/github
    #   key: token
    #   env_var: GITHUB_TOKEN
